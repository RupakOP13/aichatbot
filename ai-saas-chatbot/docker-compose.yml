version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: ai-chatbot-db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongodb_data:/data/db
    networks:
      - ai-network

  backend:
    build: ./backend
    container_name: ai-chatbot-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/ai-chatbot
      JWT_SECRET: your_jwt_secret_key_change_in_production
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_INDEX_NAME: ai-chatbot
      PINECONE_ENVIRONMENT: us-east1-aws
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongodb
    volumes:
      - ./backend/src:/app/src
    networks:
      - ai-network

  frontend:
    build: ./frontend
    container_name: ai-chatbot-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - ai-network

volumes:
  mongodb_data:

networks:
  ai-network:
    driver: bridge
